<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a9e5c;--green-d:#0e7a40;--green-light:#e6f6ee;--gold:#c8960c;--gold-light:#fdf3d7;--red:#d63b3b;
  --bg-primary:#ffffff;--bg-secondary:#f5f4f0;--bg-tertiary:#edece6;
  --text-primary:#16161a;--text-secondary:#67666f;--text-tertiary:#9a98a2;
  --border:rgba(20,20,30,.10);--border-strong:rgba(20,20,30,.2);
  --info-bg:#e8eefb;--info-text:#3358c4;
  --pitch:#0d5c3a;--pitch2:#0a7346;
  --radius-md:9px;--radius-lg:14px;--radius-xl:20px;
  --shadow-sm:0 1px 2px rgba(20,20,40,.05);--shadow-md:0 4px 16px rgba(20,20,40,.07);
  --font:'Inter',system-ui,-apple-system,sans-serif;--display:'Sora','Inter',sans-serif;
  --bnav-h:0px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg-primary:#201f23;--bg-secondary:#27262b;--bg-tertiary:#151418;
    --text-primary:#f1f0f4;--text-secondary:#a4a3ad;--text-tertiary:#76747e;
    --border:rgba(255,255,255,.12);--border-strong:rgba(255,255,255,.24);
    --green-light:#0f3826;--gold-light:#3a2e08;--info-bg:#1a2748;--info-text:#9db4f0;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);--shadow-md:0 4px 18px rgba(0,0,0,.35);
  }
}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg-tertiary);min-height:100vh;color:var(--text-primary);-webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
.app{max-width:820px;margin:0 auto;padding:1.25rem 1rem 3rem}
.hidden{display:none!important}

.login-wrap{display:flex;flex-direction:column;align-items:center;padding:3rem 1rem 5rem;max-width:600px;margin:0 auto}
.login-badge{width:72px;height:72px;border-radius:var(--radius-xl);background:linear-gradient(135deg,var(--pitch),var(--pitch2));display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin-bottom:1.25rem;box-shadow:var(--shadow-md)}
.login-title{font-family:var(--display);font-size:1.75rem;font-weight:800;letter-spacing:-.02em;margin-bottom:.35rem;text-align:center}
.login-sub{font-size:14px;color:var(--text-secondary);margin-bottom:2.25rem;text-align:center}
.user-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;width:100%;max-width:540px;margin-bottom:1.75rem}
.user-btn{background:var(--bg-primary);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem;cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s;text-align:center;box-shadow:var(--shadow-sm);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.user-btn:hover{border-color:var(--border-strong);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.user-btn:active{transform:scale(.97)}
.user-btn.selected{border-color:var(--green);background:var(--green-light);box-shadow:0 0 0 3px rgba(26,158,92,.15)}
.user-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;margin:0 auto .55rem;font-family:var(--display)}
.user-name{font-size:14px;font-weight:600}
.pin-wrap{width:100%;max-width:300px;margin-bottom:1rem}
.pin-label{font-size:13px;color:var(--text-secondary);margin-bottom:.6rem;text-align:center}
.pin-input{width:100%;text-align:center;font-size:1.6rem;letter-spacing:.6rem;border:1.5px solid var(--border-strong);border-radius:var(--radius-md);padding:.6rem;background:var(--bg-primary);color:var(--text-primary);font-family:var(--display);font-weight:700;transition:border-color .15s,box-shadow .15s}
.pin-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(26,158,92,.15)}
.pin-error{font-size:12px;color:var(--red);text-align:center;margin-bottom:.5rem;min-height:18px;font-weight:500}
.btn-login{background:var(--green);color:#fff;border:none;border-radius:var(--radius-md);padding:.75rem 2rem;font-size:15px;font-weight:600;cursor:pointer;width:100%;max-width:300px;transition:opacity .12s,transform .12s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn-login:hover:not(:disabled){opacity:.92;transform:translateY(-1px)}
.btn-login:active:not(:disabled){transform:scale(.98)}
.btn-login:disabled{opacity:.4;cursor:not-allowed}
.admin-entry{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:1.5rem;padding:.65rem 1.1rem;border:1px dashed var(--border-strong);border-radius:999px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-secondary);transition:all .12s;background:transparent;-webkit-tap-highlight-color:transparent}
.admin-entry:hover{border-color:var(--text-secondary);color:var(--text-primary)}
.admin-entry.selected{border-style:solid;border-color:var(--gold);background:var(--gold-light);color:#8a6500}
.admin-entry-icon{font-size:1rem}
.nav-admin{background:linear-gradient(180deg,var(--gold-light),var(--bg-primary))}

.nav{background:var(--bg-primary);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px) saturate(1.4);-webkit-backdrop-filter:blur(12px) saturate(1.4)}
.nav-inner{max-width:820px;margin:0 auto;display:flex;align-items:center;padding:.55rem 1rem;gap:.75rem}
.nav-logo{font-family:var(--display);font-weight:800;font-size:1rem;letter-spacing:-.02em;display:flex;align-items:center;gap:.4rem;white-space:nowrap}
.nav-logo .ball{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--pitch),var(--pitch2));display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.nav-tabs{display:flex;gap:3px;overflow-x:auto;flex:1;scrollbar-width:none;-ms-overflow-style:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{font-size:13px;padding:.45rem .8rem;border:none;background:transparent;border-radius:999px;cursor:pointer;color:var(--text-secondary);white-space:nowrap;font-family:var(--font);font-weight:500;transition:all .12s;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.nav-tab:hover{background:var(--bg-secondary);color:var(--text-primary)}
.nav-tab.active{background:var(--text-primary);color:var(--bg-primary);font-weight:600}
.nav-right{display:flex;align-items:center;gap:.4rem;font-size:13px;color:var(--text-secondary);white-space:nowrap;flex-shrink:0}
.nav-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(26,158,92,.2);flex-shrink:0}
.nav-user-name{font-weight:600;color:var(--text-primary);max-width:90px;overflow:hidden;text-overflow:ellipsis}
@media(max-width:900px){.nav-user-name,.nav-dot{display:none}}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:14px;padding:6px 8px;font-family:var(--font);border-radius:8px;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:color .12s,background .12s}
.icon-btn:hover{color:var(--text-primary);background:var(--bg-secondary)}
.icon-btn:active{background:var(--bg-tertiary)}

/* ── Bottom Navigation ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--bg-primary);border-top:1px solid var(--border);backdrop-filter:blur(16px) saturate(1.6);-webkit-backdrop-filter:blur(16px) saturate(1.6)}
.bottom-nav-inner{display:flex;padding-bottom:var(--safe-b)}
.bottom-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:.45rem .1rem;border:none;background:transparent;color:var(--text-tertiary);font-size:9px;font-weight:700;font-family:var(--font);letter-spacing:.03em;cursor:pointer;min-height:52px;transition:color .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;text-transform:uppercase}
.bottom-nav-btn.active{color:var(--green)}
.bottom-nav-icon{font-size:1.3rem;line-height:1;display:block;transition:transform .15s}
.bottom-nav-btn.active .bottom-nav-icon{transform:scale(1.1)}

.page{padding:1.1rem 0;animation:pageIn .2s ease both}
@keyframes pageIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.section-title{font-family:var(--display);font-size:11.5px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.07em;margin:1.5rem 0 .65rem}

.rank-card{background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1rem;box-shadow:var(--shadow-sm)}
.rank-row{display:flex;align-items:center;padding:.85rem 1rem;gap:.85rem;border-bottom:1px solid var(--border);transition:background .12s}
.rank-row:last-child{border-bottom:none}
.rank-row.me{background:var(--green-light)}
.rank-row.podium1{background:linear-gradient(90deg,rgba(200,150,12,.10),transparent)}
.rank-pos{font-size:1.15rem;min-width:32px;text-align:center;font-family:var(--display);font-weight:700}
.rank-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;font-family:var(--display);flex-shrink:0}
.rank-name{font-weight:600;font-size:15px}
.rank-pts{font-family:var(--display);font-size:1.3rem;font-weight:800;letter-spacing:-.02em}
.rank-pts-label{font-size:10px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em}
.rank-detail{font-size:12px;color:var(--text-secondary);margin-top:1px}

.filter-bar{display:flex;gap:7px;flex-wrap:nowrap;overflow-x:auto;margin-bottom:1.1rem;padding-bottom:2px;scrollbar-width:none;-ms-overflow-style:none;-webkit-overflow-scrolling:touch}
.filter-bar::-webkit-scrollbar{display:none}
.filter-btn{font-size:12.5px;padding:.4rem .9rem;border:1px solid var(--border);border-radius:999px;background:var(--bg-primary);cursor:pointer;color:var(--text-secondary);font-family:var(--font);font-weight:500;transition:all .12s;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.filter-btn:hover{border-color:var(--border-strong)}
.filter-btn:active{transform:scale(.96)}
.filter-btn.active{background:var(--text-primary);color:var(--bg-primary);border-color:var(--text-primary);font-weight:600}
.match-card{background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:.65rem;overflow:hidden;box-shadow:var(--shadow-sm);transition:box-shadow .15s}
.match-card:hover{box-shadow:var(--shadow-md)}
.match-header{display:flex;align-items:center;padding:.5rem .85rem;border-bottom:1px solid var(--border);gap:.45rem;flex-wrap:wrap;row-gap:.25rem}
.match-group-tag{font-family:var(--display);font-size:10px;font-weight:700;color:var(--green-d);background:var(--green-light);padding:.18rem .5rem;border-radius:999px;letter-spacing:.02em;white-space:nowrap}
.match-date{font-size:11px;color:var(--text-secondary);margin-left:auto;font-weight:500;white-space:nowrap}
.match-lock{font-size:9.5px;color:var(--red);font-weight:700;background:rgba(214,59,59,.1);padding:.18rem .45rem;border-radius:999px;white-space:nowrap}
.match-body{padding:.85rem}
.match-teams{display:flex;align-items:center;gap:.5rem}
.team-side{flex:1;display:flex;align-items:center;gap:.45rem;min-width:0;overflow:hidden}
.team-side.right{flex-direction:row-reverse;text-align:right}
.team-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.score-inputs{display:flex;align-items:center;gap:.35rem;flex-shrink:0;background:var(--bg-secondary);padding:.28rem .4rem;border-radius:var(--radius-md)}
.score-input{width:44px;height:44px;text-align:center;font-size:1.2rem;font-weight:700;border:1.5px solid var(--border);border-radius:8px;background:var(--bg-primary);color:var(--text-primary);font-family:var(--display);transition:border-color .15s,box-shadow .15s;-moz-appearance:textfield;appearance:textfield}
.score-input::-webkit-inner-spin-button,.score-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.score-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 2px rgba(26,158,92,.18)}
.score-input:disabled{background:var(--bg-secondary);color:var(--text-tertiary);border-color:transparent}
.score-sep{font-size:.85rem;color:var(--text-tertiary);font-weight:700;user-select:none}
.match-result-badge{font-size:12px;font-weight:700;padding:.3rem .8rem;border-radius:999px;display:inline-flex;align-items:center;gap:.3rem;font-family:var(--display)}
.badge-exact{background:var(--green-light);color:var(--green-d)}
.badge-inter{background:#e8f0fe;color:#1a56c4}
.badge-winner{background:var(--gold-light);color:#8a6500}
.badge-miss{background:rgba(214,59,59,.12);color:#a82626}
.badge-inverse{background:rgba(214,59,59,.18);color:#a82626;font-weight:800}
.badge-pending{background:var(--bg-secondary);color:var(--text-secondary)}
.result-line{margin-top:.5rem;font-size:12px;color:var(--text-secondary);font-weight:500}
.et-section{margin-top:.6rem;padding:.65rem .8rem;background:var(--bg-secondary);border-radius:var(--radius-md);border:1px dashed var(--border-strong)}
.et-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.45rem;flex-wrap:wrap}
.et-row:last-child{margin-bottom:0}
.et-label{font-size:12px;color:var(--text-secondary);min-width:120px;font-weight:500}
.et-select{font-size:12.5px;padding:.35rem .6rem;border:1px solid var(--border-strong);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);font-family:var(--font)}

/* All-bets table – scrollable with sticky first column */
.all-table-wrap{margin-bottom:.65rem}
.all-table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm)}
.all-table-scroll::-webkit-scrollbar{height:3px}
.all-table-scroll::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px}
.all-table-v2{width:100%;border-collapse:collapse;font-size:13px;background:var(--bg-primary);min-width:360px}
.all-table-v2 th,.all-table-v2 td{padding:.55rem .7rem;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap}
.all-table-v2 tr:last-child td{border-bottom:none}
.all-table-v2 thead th{background:var(--bg-secondary);font-family:var(--display);font-size:10.5px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.03em}
.all-table-v2 .sticky-col{position:sticky;left:0;z-index:2;text-align:left;min-width:100px;max-width:130px;white-space:normal;line-height:1.35;font-size:11.5px}
.all-table-v2 thead .sticky-col{background:var(--bg-secondary)}
.all-table-v2 tbody .sticky-col{background:var(--bg-primary);font-size:11px;color:var(--text-secondary);font-weight:500}
.all-bets-hint{font-size:12px;color:var(--text-secondary);margin-bottom:.75rem}

.bonus-card{background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem;margin-bottom:.8rem;box-shadow:var(--shadow-sm)}
.bonus-head{display:flex;align-items:center;gap:.6rem;margin-bottom:.85rem}
.bonus-icon{width:34px;height:34px;border-radius:10px;background:var(--gold-light);display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0}
.bonus-title{font-family:var(--display);font-size:15px;font-weight:700}
.bonus-pts{font-size:11.5px;color:var(--text-secondary);font-weight:500}
.team-search,.player-input{width:100%;font-size:13.5px;padding:.5rem .7rem;border:1.5px solid var(--border-strong);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);font-family:var(--font);margin-bottom:.4rem}
.team-search:focus,.player-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 2px rgba(26,158,92,.15)}
.team-dropdown{border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;max-height:170px;overflow-y:auto;background:var(--bg-primary)}
.team-option{padding:.5rem .7rem;cursor:pointer;display:flex;align-items:center;gap:.6rem;font-size:13.5px;transition:background .1s}
.team-option:hover{background:var(--green-light)}
.selected-team{display:flex;align-items:center;gap:.6rem;padding:.55rem .7rem;background:var(--green-light);border-radius:var(--radius-md);font-size:13.5px;font-weight:600;color:var(--green-d)}

.admin-match{background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.85rem;margin-bottom:.6rem;box-shadow:var(--shadow-sm)}
.admin-match-title{font-size:13px;font-weight:600;margin-bottom:.65rem;line-height:1.4}
.admin-inputs{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;row-gap:.5rem}
.admin-score{width:48px;height:42px;text-align:center;font-size:1.05rem;font-weight:700;border:1.5px solid var(--border-strong);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);font-family:var(--display);-moz-appearance:textfield;appearance:textfield}
.admin-score::-webkit-inner-spin-button,.admin-score::-webkit-outer-spin-button{-webkit-appearance:none}
.btn-confirm{font-size:13px;padding:.5rem 1rem;border:none;border-radius:var(--radius-md);background:var(--green);color:#fff;cursor:pointer;font-family:var(--font);font-weight:600;min-height:40px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:opacity .12s}
.btn-confirm:hover{opacity:.9}
.btn-confirm:active{opacity:.8}
.btn-clear{font-size:12px;padding:.45rem .8rem;border:1px solid var(--red);border-radius:var(--radius-md);background:transparent;color:var(--red);cursor:pointer;font-family:var(--font);font-weight:600;min-height:40px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn-clear:hover{background:rgba(214,59,59,.1)}
.admin-match.has-result{border-color:var(--green);box-shadow:inset 3px 0 0 var(--green)}
.confirmed-tag{font-size:11.5px;color:var(--green-d);font-weight:700}
.deadline-banner{background:var(--gold-light);border:1px solid rgba(200,150,12,.4);border-radius:var(--radius-md);padding:.65rem .85rem;font-size:12.5px;margin-bottom:1.1rem;font-weight:500;display:flex;align-items:center;gap:.4rem}
.flag{width:26px;height:18px;object-fit:cover;border-radius:3px;flex-shrink:0;box-shadow:0 0 0 1px var(--border)}
.flag-sm{width:22px;height:15px;object-fit:cover;border-radius:2px;flex-shrink:0;box-shadow:0 0 0 1px var(--border)}
.loading{text-align:center;padding:3.5rem 1rem;color:var(--text-secondary);font-size:14px}
.team-option{padding:.6rem .7rem;cursor:pointer;display:flex;align-items:center;gap:.6rem;font-size:13.5px;transition:background .1s;min-height:44px;-webkit-tap-highlight-color:transparent}
.et-select{font-size:12.5px;padding:.4rem .6rem;border:1px solid var(--border-strong);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);font-family:var(--font);min-height:38px}

/* ── Mobile breakpoints ── */
@media(max-width:640px){
  :root{--bnav-h:56px}
  .bottom-nav{display:block}
  .nav-tabs{display:none}
  .nav-user-name,.nav-dot{display:none}
  .app{padding:1rem .85rem;padding-bottom:calc(var(--bnav-h) + var(--safe-b) + 1.5rem)}
  .login-wrap{padding:2rem .85rem calc(var(--bnav-h) + var(--safe-b) + 2rem)}
  .user-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .user-btn{padding:.85rem .5rem}
  .score-input{width:46px;height:46px;font-size:1.2rem}
  .match-body{padding:.75rem}
  .match-header{padding:.45rem .75rem}
  .team-name{font-size:12.5px}
  .nav-inner{padding:.5rem .85rem}
  .rank-row{padding:.8rem .85rem;gap:.7rem}
  .et-label{min-width:100px;font-size:11.5px}
  .admin-inputs{gap:.4rem}
  .bonus-card{padding:.9rem}
  .rules-section{padding:.9rem}
  .rules-table td,.rules-table th{padding:.45rem .5rem;font-size:12.5px}
  .filter-bar{margin-bottom:.85rem}
  .section-title{margin:1.25rem 0 .55rem}
}

/* Countdown timer */
.countdown{font-family:var(--display);font-size:10.5px;font-weight:700;letter-spacing:.01em;padding:.2rem .55rem;border-radius:999px;display:inline-flex;align-items:center;gap:.3rem;background:var(--info-bg);color:var(--info-text)}
.countdown.urgent{background:rgba(214,59,59,.12);color:#a82626;animation:pulse 1.6s ease-in-out infinite}
.countdown.warning{background:var(--gold-light);color:#8a6500}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
.countdown-icon{font-size:9px}

/* Rules page */
.rules-section{background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow-sm)}
.rules-h{font-family:var(--display);font-size:1.05rem;font-weight:700;margin-bottom:.65rem;display:flex;align-items:center;gap:.5rem}

function esc(v){return String(v??'').replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]))}
function scoreFilled(v){return v!==undefined&&v!==null&&v!==''&&!Number.isNaN(Number(v))}
function scoreValue(v){return Number(v)}
function isValidScoreInput(v){return v===''||(/^\d+$/.test(String(v))&&Number(v)>=0&&Number(v)<=20)}

function getLockTime(matchDate){return new Date(new Date(matchDate).getTime()-LOCK_MINUTES_BEFORE*60*1000)}
function isLocked(m){return new Date()>=getLockTime(m.date)}

// Calcula tempo restante até o lock (5 min antes do jogo) e devolve string formatada
function countdownTo(matchDate){
  const lockMs=getLockTime(matchDate).getTime();
  const diff=lockMs-Date.now();
  if(diff<=0)return null;
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  let urgency='';
  if(diff<60*60*1000)urgency='urgent';        // < 1h: vermelho pulsando
  else if(diff<6*60*60*1000)urgency='warning'; // < 6h: amarelo
  let text;
  if(d>0)text=`${d}d ${h}h ${String(m).padStart(2,'0')}m`;
  else if(h>0)text=`${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
  else text=`${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
  return {text,urgency};
}

function calcPoints(p,r){
  if(!r||r.homeScore===undefined)return null;
  if(!p||!scoreFilled(p.homeScore)||!scoreFilled(p.awayScore))return null;
  const rH=scoreValue(r.homeScore),rA=scoreValue(r.awayScore),pH=scoreValue(p.homeScore),pA=scoreValue(p.awayScore);
  if(pH===rH&&pA===rA)return 10;
  // Acerto Invertido: placar exatamente oposto (só vale quando há vencedor)
  if(rH!==rA&&pH===rA&&pA===rH)return -2;
  const rR=rH>rA?'H':rH<rA?'A':'D',pR=pH>pA?'H':pH<pA?'A':'D';
  if(pR===rR){
    // Acerto Intermediário: acertou vencedor/empate + placar de um time ou diferença de gols (≠0)
    const diff=rH-rA;
    if(pH===rH||pA===rA||(diff!==0&&(pH-pA)===diff))return 6;
    return 5;
  }
  return 0;
}

  if(pH===rH&&pA===rA)return 10;
  if(rH===rA){
    // Resultado empatado no tempo normal: o diferencial é acertar o classificado.
    if(r.advancedTeam&&p.advancedTeam&&r.advancedTeam===p.advancedTeam)return 5;
    if(p.advancedTeam)return 2;

  }
  // Acerto Invertido: placar exatamente oposto (só quando há vencedor no tempo normal)
  if(pH===rA&&pA===rH)return -2;
  // Quem palpitou empate não pontua quando o resultado teve vencedor
  if(pH===pA)return 0;
  const rW=rH>rA?'home':'away',pW=pH>pA?'home':'away';
  if(rW===pW){
    // Acerto Intermediário: acertou vencedor + placar de um time ou diferença de gols
    const diff=rH-rA;
    if(pH===rH||pA===rA||(diff!==0&&(pH-pA)===diff))return 6;
    return 5;
  }
  return 0;
}

// ===== CAMADA DE DADOS (fala com /api/data) =====
// Otimizações:
// 1. Debounce de writes: inputs rápidos (digitar placar) geram apenas 1 request
// 2. Retry automático (1x) em falha de rede transitória
// 3. Fila de saves: nunca duas escritas simultâneas para a mesma chave
// 4. Feedback visual sem bloquear a UI

const _saveTimers = {};   // debounce por chave
const _saveQueue  = {};   // evita concorrência por chave

async function _fetchWithRetry(url, opts, retries=1) {
  try {
    const r = await fetch(url, opts);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r;
  } catch(e) {
    if (retries > 0) {
      await new Promise(res => setTimeout(res, 600));
      return _fetchWithRetry(url, opts, retries - 1);
    }
    throw e;
  }
}

async function loadData(){
  try{
    const r = await _fetchWithRetry('/api/data');
    return await r.json();
  }catch(e){
    console.error('[bolao] loadData:', e);
    return {bets:{},results:{},bonusBets:{},bonusResults:{},matchTeams:{}};
  }
}

// apiSave com debounce — chamadas dentro de 400ms para a mesma chave
// são colapsadas numa só request
function apiSave(scope, value, uid) {
  const key = uid ? `${scope}:${uid}` : scope;
  const shouldDebounce = scope === 'bets' || scope === 'bonusBets';

  if (_saveTimers[key]) {
    clearTimeout(_saveTimers[key].timer);
    _saveTimers[key].resolve?.({cancelled:true});
    delete _saveTimers[key];
  }

  const runSave = () => {
    const prev = (_saveQueue[key] || Promise.resolve()).catch(() => {});
    const job = prev.then(async () => {
      try {
        await _fetchWithRetry('/api/data', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({scope, uid, value}),
        });
        return {ok:true};
      } catch(e) {
        console.error('[bolao] apiSave:', e);
        showToast('Não salvou. Verifique sua conexão e tente novamente.', 'error');
        return {ok:false,error:e};
      }
    });
    _saveQueue[key] = job.finally(() => {
      if (_saveQueue[key] === job) delete _saveQueue[key];
    });
    return job;
  };

  if (!shouldDebounce) return runSave();

  return new Promise((resolve) => {
    const timer = setTimeout(() => {
      delete _saveTimers[key];
      runSave().then(resolve);
    }, 400);
    _saveTimers[key] = {timer, resolve};
  });
}

function showToast(msg, type='info'){
  let t = document.getElementById('toast');
  if(!t){
    t=document.createElement('div');t.id='toast';document.body.appendChild(t);
    const bnav=document.querySelector('.bottom-nav');
    const bh=bnav&&getComputedStyle(bnav).display!=='none'?bnav.offsetHeight:0;
    t.style.cssText=`position:fixed;bottom:${bh+12}px;left:50%;transform:translateX(-50%);padding:.6rem 1.1rem;border-radius:999px;font-size:13px;font-weight:600;z-index:9999;transition:opacity .3s;font-family:var(--font);box-shadow:0 4px 16px rgba(0,0,0,.15);max-width:calc(100vw - 2rem);text-align:center`;
  }
  t.textContent=msg;
  t.style.background=type==='error'?'#d63b3b':'#1a9e5c';
  t.style.color='#fff';t.style.opacity='1';
  clearTimeout(t._hide);
  t._hide=setTimeout(()=>{t.style.opacity='0';},3000);
}

function activeUsers(){return USERS.filter(u=>!u.suspended)}
function computeRanking(){
  return activeUsers().map((u,i)=>{
    let pts=0,exact=0,inter=0,winner=0,inverse=0;
    RAW_MATCHES.forEach(m=>{
      const res=DATA.results[m.id];if(!res||res.homeScore===undefined)return;
      const rawBet=(DATA.bets[u.id]||{})[m.id];
      const p=rawBet||(isLocked(m)?{homeScore:0,awayScore:0}:null);if(!p)return;
      const mp=m.type==='group'?calcPoints(p,res):calcKOPoints(p,res);
      if(mp===10)exact++;else if(mp===6)inter++;else if(mp===5)winner++;else if(mp===-2)inverse++;
      if(mp!==null)pts+=mp;
    });
    const bb=DATA.bonusBets[u.id]||{};
    BONUS_ITEMS.forEach(bi=>{const c=DATA.bonusResults[bi.id];if(c&&bb[bi.id]&&String(c)===String(bb[bi.id]))pts+=bi.pts;});
    return {user:u,idx:i,pts,exact,inter,winner,inverse};
  }).sort((a,b)=>b.pts-a.pts||b.exact-a.exact||b.inter-a.inter||b.winner-a.winner);
}

}

let countdownInterval=null;
function startCountdownTick(){
  if(countdownInterval)clearInterval(countdownInterval);
  countdownInterval=setInterval(()=>{
    let needsRerender=false;
    document.querySelectorAll('[data-countdown]').forEach(el=>{
      const date=el.dataset.countdown;
      const cd=countdownTo(date);
      if(!cd){needsRerender=true;return;}
      el.innerHTML='<span class="countdown-icon">⏱</span>'+cd.text;
      el.className='countdown '+cd.urgency;
    });
    if(needsRerender)renderPage();
  },1000);
}

async function saveBet(id,field,val){
  const m=RAW_MATCHES.find(x=>x.id===id);
  if(m&&isLocked(m)){alert('Palpites encerrados para este jogo.');renderPage();return;}
  if((field==='homeScore'||field==='awayScore')&&!isValidScoreInput(val)){
    alert('Use um placar entre 0 e 20.');renderPage();return;
  }
  const uid=state.currentUser.id;
  if(!DATA.bets[uid])DATA.bets[uid]={};
  if(!DATA.bets[uid][id])DATA.bets[uid][id]={};
  DATA.bets[uid][id][field]=val===''?'':Number(val);

  if(m&&m.type!=='group'){
    const b=DATA.bets[uid][id],pH=b.homeScore,pA=b.awayScore;
    if(!scoreFilled(pH)||!scoreFilled(pA)||scoreValue(pH)!==scoreValue(pA)){delete b.etType;delete b.advancedTeam;}
    setTimeout(renderPage,60);
  }
  await apiSave('bets',DATA.bets[uid],uid);
}
async function setET(id,field,val){
  const m=RAW_MATCHES.find(x=>x.id===id);

  const uid=state.currentUser.id;
  if(!DATA.bets[uid])DATA.bets[uid]={};if(!DATA.bets[uid][id])DATA.bets[uid][id]={};
  DATA.bets[uid][id][field]=val;await apiSave('bets',DATA.bets[uid],uid);renderPage();
}

  const hN=hT?hT.name:'Mandante',aN=aT?aT.name:'Visitante';
  const already=DATA.results[id]&&DATA.results[id].homeScore!==undefined;
  const msg=(already?'⚠️ JÁ EXISTE um resultado para este jogo e ele será SOBRESCRITO.\n\n':'')
    +`Lançar como RESULTADO OFICIAL (vale para a pontuação de todos):\n\n${hN} ${+h} × ${+a} ${aN}\n\nConfirmar?`;

// Gestão de usuários
async function addUser(){
  const name=document.getElementById('new-name')?.value.trim();
  const pin=document.getElementById('new-pin')?.value.trim();
  const initials=document.getElementById('new-initials')?.value.trim().toUpperCase();
  const st=document.getElementById('add-user-status');
  if(!name||!pin||!initials){st.textContent='Preencha nome, PIN e sigla.';st.style.color='var(--red)';return;}
  if(/[<>]/.test(name)||/[<>]/.test(initials)){st.textContent='Nome/sigla não podem conter < ou >.';st.style.color='var(--red)';return;}
  if(!/^\d{4}$/.test(pin)){st.textContent='PIN deve ter 4 dígitos.';st.style.color='var(--red)';return;}
  if(!/^[A-Z0-9]{1,3}$/.test(initials)){st.textContent='Sigla deve ter até 3 letras/números.';st.style.color='var(--red)';return;}
  if(pin===ADMIN_PIN){st.textContent='Este PIN é reservado ao admin.';st.style.color='var(--red)';return;}
  const id=name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
  if(id.length<2){st.textContent='Nome precisa gerar um ID válido.';st.style.color='var(--red)';return;}
  if(id==='__admin__'){st.textContent='ID reservado ao admin.';st.style.color='var(--red)';return;}
  if(USERS.find(u=>u.id===id)){st.textContent='Já existe um participante com este nome.';st.style.color='var(--red)';return;}
  if(USERS.find(u=>u.pin===pin)){st.textContent='PIN já usado por outro participante.';st.style.color='var(--red)';return;}
  const newUser={id,name,pin,initials};
  const updated=[...USERS,newUser];
  await apiSave('users',updated);
  USERS=updated;DATA.users=updated;
  showToast(`${name} adicionado ao bolão.`);
  renderPage();
}

async function toggleSuspend(uid){
  const user=USERS.find(u=>u.id===uid);if(!user)return;
  const action=user.suspended?'reativar':'suspender';
  const msg=user.suspended
    ?`Reativar ${user.name}?\n\nEle voltará a aparecer no ranking e nos palpites.`
    :`Suspender ${user.name}?\n\nEle ficará oculto do ranking e da tabela de palpites enquanto estiver suspenso. Os dados são preservados e pode ser revertido a qualquer momento.`;
  if(!confirm(msg))return;
  user.suspended=!user.suspended;
  const updated=[...USERS];
  await apiSave('users',updated);
  USERS=updated;DATA.users=updated;
  showToast(`${user.name} ${user.suspended?'suspenso':'reativado'}.`,user.suspended?'error':'info');
  renderPage();
}
async function removeUser(uid){
  const user=USERS.find(u=>u.id===uid);
  if(!user)return;
  if(!confirm(`Remover ${user.name} do bolão?\n\nOs palpites e pontos dele serão ocultados, mas os dados ficam no banco.`))return;
  const updated=USERS.filter(u=>u.id!==uid);
  await apiSave('users',updated);
  USERS=updated;DATA.users=updated;
  showToast(`${user.name} removido.`,'error');
  renderPage();
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('pin-input')===document.activeElement)doLogin();});
init();
</script>
